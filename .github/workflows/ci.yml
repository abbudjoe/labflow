name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip pytest ruff mypy pydantic PyYAML types-PyYAML fastapi httpx

      - name: Run Python smoke tests
        run: make test

      - name: Lint Python skeleton
        run: make lint

      - name: Type-check Python skeleton
        run: make type-python

  vscode:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install VS Code extension dependencies
        run: npm install --prefix apps/vscode-extension

      - name: Compile VS Code extension skeleton
        run: npm --prefix apps/vscode-extension run compile
