[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "labflow-core"
version = "0.1.0"
description = "Deterministic LabFlow AI Studio workflow engine skeleton."
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.8",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.10",
  "pytest>=8.0",
  "ruff>=0.6",
  "types-PyYAML>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/labflow_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["labflow_core"]
